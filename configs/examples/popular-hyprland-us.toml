# Hyprland + US English — tiling Wayland compositors (Hyprland, Sway) rank very high in
# recent r/archlinux community surveys alongside traditional DEs. Set passwords in the TUI before install.

[[users]]
username = "archie"
is_sudo = true

additional_packages = []

[locales]
keyboard_layout = "us"
locale_language = "en_US.UTF-8"
locale_encoding = "UTF-8"

[mirrors]
regions = ["United States          US   189"]
optional_repos = ["multilib"]
custom_servers = []
custom_repos = []

[disks]
mode = "Best-effort partition layout"

[disk_encryption]
encryption_type = "None"

[swap]
enabled = true

[bootloader]
kind = "systemd-boot"

[system]
hostname = "archlinux"
automatic_time_sync = true
timezone = "America/Los_Angeles"

[unified_kernel_images]
enabled = false

[kernels]
selected = ["linux"]

[audio]
kind = "pipewire"

[experience]
mode = "Desktop"
desktop_envs = ["Hyprland"]
server_types = []
xorg_types = []
login_manager = "sddm"
login_manager_user_set = false
graphic_drivers = [
    "intel-media-driver",
    "libva-intel-driver",
    "mesa",
    "vulkan-intel",
    "vulkan-nouveau",
    "vulkan-radeon",
    "xf86-video-amdgpu",
    "xf86-video-ati",
    "xf86-video-nouveau",
    "xorg-server",
    "xorg-xinit",
]

[experience.desktop_env_packages]
"Hyprland" = [
    "dolphin",
    "dunst",
    "grim",
    "hyprland",
    "kitty",
    "polkit-kde-agent",
    "qt5-wayland",
    "qt6-wayland",
    "slurp",
    "polkit",
    "wofi",
    "xdg-desktop-portal-hyprland",
    "htop",
    "iwd",
    "nano",
    "openssh",
    "smartmontools",
    "vim",
    "wget",
    "wireless_tools",
    "wpa_supplicant",
    "xdg-utils",
]

[network]
mode = "NetworkManager"
