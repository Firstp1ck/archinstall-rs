[bootloader]
kind = "systemd-boot"

[system]
hostname = "archlinux"
root_password_hash = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"
automatic_time_sync = true
timezone = "Asia/Tokyo"

[unified_kernel_images]
enabled = false

[kernels]
