# Japan: Japanese locale + KDE Plasma + local mirrors. Add fonts (e.g. noto-fonts-cjk) in the
# TUI or additional_packages if you need full CJK coverage. Replace password hashes before use.

[[users]]
username = "archie"
password_hash = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"
is_sudo = true

additional_packages = []

[locales]
keyboard_layout = "jp106"
