# Swiss German (Switzerland) + KDE Plasma — mirrors and locale for CH; typical multilib + PipeWire stack.
# Set root and user passwords in the TUI before install (presets omit password hashes).
# Disk layout is always re-confirmed in the TUI after load; this file omits a concrete device snapshot.

[[users]]
username = "archie"
is_sudo = true

additional_packages = []

[locales]
keyboard_layout = "de_CH-latin1"
locale_language = "de_CH.UTF-8"
locale_encoding = "UTF-8"

[mirrors]
# Exact line from `reflector --list-countries` (mirror counts change over time; re-copy if load misses).
regions = ["Switzerland            CH    26"]
optional_repos = ["multilib"]
custom_servers = []
custom_repos = []

[disks]
mode = "Best-effort partition layout"

[disk_encryption]
encryption_type = "None"

[swap]
enabled = true

[bootloader]
kind = "systemd-boot"

[system]
hostname = "archlinux"
automatic_time_sync = true
timezone = "Europe/Zurich"

[unified_kernel_images]
enabled = false

[kernels]
selected = ["linux", "linux-lts"]

[audio]
kind = "pipewire"

[experience]
mode = "Desktop"
desktop_envs = ["KDE Plasma"]
server_types = []
xorg_types = []
login_manager = "sddm"
login_manager_user_set = false
graphic_drivers = [
    "intel-media-driver",
    "libva-intel-driver",
    "mesa",
    "vulkan-intel",
    "vulkan-nouveau",
    "vulkan-radeon",
    "xf86-video-amdgpu",
    "xf86-video-ati",
    "xf86-video-nouveau",
    "xorg-server",
    "xorg-xinit",
]

[experience.desktop_env_packages]
"KDE Plasma" = [
    "ark",
    "dolphin",
    "kate",
    "konsole",
    "plasma-meta",
    "plasma-workspace",
    "htop",
    "iwd",
    "nano",
    "openssh",
    "smartmontools",
    "vim",
    "wget",
    "wireless_tools",
    "wpa_supplicant",
    "xdg-utils",
]

[network]
mode = "NetworkManager"
