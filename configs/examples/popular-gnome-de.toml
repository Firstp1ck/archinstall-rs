# GNOME + German locale — GNOME is the second most common desktop in pkgstats after Plasma;
# mirror region matches Germany. Replace password hashes before use.

[[users]]
username = "archie"
password_hash = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"
is_sudo = true

additional_packages = []

[locales]
keyboard_layout = "de-latin1"
